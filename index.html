<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUNSketch AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #120a00;
            --panel-bg: rgba(30, 20, 10, 0.6);
            --border-color: rgba(255, 170, 0, 0.15);
            --primary-color: #ffaa00;
            --primary-glow: rgba(255, 170, 0, 0.4);
            --text-main: #fffcf8;
            --text-muted: #e5ccb3;
        }
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, var(--bg-color) 0%, #2a1600 100%);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }
        .ambient-light {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--primary-glow) 0%, rgba(0,0,0,0) 70%);
            filter: blur(80px);
            z-index: -1;
             pointer-events: none;
        }
        header {
            padding: 2rem;
            text-align: center;
        }
        header h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #fff, #ffcc55);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p {
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-weight: 300;
        }
        main {
            display: flex;
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem 2rem 2rem;
            flex-grow: 1;
            align-items: flex-start;
            width: 100%;
            box-sizing: border-box;
        }
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 170, 0, 0.15);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 170, 0, 0.05), transparent);
            transform: skewX(-20deg);
            animation: shimmer 8s infinite;
        }
        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 200%; }
        }
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            background: rgba(255, 200, 50, 0.15);
            border-radius: 50%;
            animation: float linear infinite;
        }
        @keyframes float {
            0% { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
            10% { opacity: 0.6; scale: 1; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100px) translateX(100px) scale(0); opacity: 0; }
        }
        .workspace {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }
        .canvas-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            overflow: hidden;
            border: 2px dashed rgba(255, 170, 0, 0.2);
            transition: border-color 0.3s;
        }
        .canvas-container:hover {
            border-color: rgba(255, 170, 0, 0.5);
            }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            z-index: 10;
        }
        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            }
        svg.visible {
            opacity: 1;
        }
        .controls {
            display: flex;
            gap: 1rem;
            width: 100%;
            justify-content: center;
        }
        button {
            background: rgba(255, 170, 0, 0.05);
            color: white;
            border: 1px solid var(--border-color);
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-family: inherit;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        button:hover {
            background: rgba(255, 170, 0, 0.15);
            transform: translateY(-2px);
        }
        button.primary {
            background: var(--primary-color);
            border-color: var(--primary-color);
            box-shadow: 0 0 15px var(--primary-glow);
        }
        button.primary:hover {
            background: #e69900;
            box-shadow: 0 0 25px var(--primary-glow);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .sidebar {
            flex: 1;
            min-width: 300px;
            width: 100%;
        }
        .stats-header {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .shape-badge {
            background: rgba(255, 170, 0, 0.15);
            color: #ffcc55;
            padding: 0.25rem 0.75rem;
            border-radius: 99px;
            font-size: 0.875rem;
            text-transform: capitalize;
            border: 1px solid rgba(255, 170, 0, 0.3);
            display: none;
        }
        .stat-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .stat-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            transition: all 0.3s ease;
            }
        .stat-item:hover {
            background: rgba(0, 0, 0, 0.3);
            transform: translateX(4px);
        }
        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-value {
            font-size: 1.25rem;
            font-weight: 600;
            color: #fff;
            word-break: break-all;
        }
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 30;
            backdrop-filter: blur(4px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            border-radius: 16px;
        }
        .loading-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @media (max-width: 768px) {
            main {
                flex-direction: column;
            }
        }
        @media (max-width: 768px) {
            main {
                flex-direction: column;
                align-items: center;
                gap: 1.5rem;
                padding: 0 1rem 1.5rem 1rem;
            }
            .sidebar, .workspace {
                width: 100%;
                min-width: 0;
            }
            .canvas-container {
                max-width: 100%;
            }
            .controls {
                flex-wrap: wrap;
                width: 100%;
                justify-content: center;
            }
            .controls button {
                flex: 1;
                min-width: 140px;
            }
            header {
                padding: 1.5rem 1rem;
            }
            header h1 {
                font-size: 2rem;
            }
            .ambient-light {
                width: 300px;
                height: 300px;
                top: 30%;
            }
        }
    </style>
</head>
<body>
    <div class="ambient-light"></div>
    <div class="particles" id="particles"></div>
    <header>
        <div style="display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: -15px; margin-top: 10px;">
            <img src="/logo.png" alt="SUNSketch Logo" style="width: 60px; height: 60px; border-radius: 50%; box-shadow: 0 0 25px var(--primary-glow);">
            <h1>SUNSketch AI</h1>
        </div>
        <p>Draw a shape, and our NumPy CNN will mathematically reconstruct it.</p>
    </header>
    <main>
        <section class="workspace glass-panel">
            <div class="canvas-container">
                <canvas id="drawCanvas" width="400" height="400"></canvas>
                <svg id="svgOverlay" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg"></svg>
                <div class="loading-overlay" id="loading">
                    <div class="spinner"></div>
                </div>
            </div>
            <div class="controls">
                <button id="clearBtn">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    Clear
                </button>
                <button id="analyzeBtn" class="primary">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Analyze Shape
                </button>
            </div>
        </section>
        <aside class="sidebar glass-panel" style="justify-content: center; align-items: center; text-align: center;">
            <div style="font-size: 1rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 1rem;">Prediction</div>
            <div id="predictionResult" style="font-size: 3rem; font-weight: 700; color: #fff; text-transform: capitalize; margin-bottom: 0.5rem; text-shadow: 0 0 20px var(--primary-glow);">-</div>
            <div id="accuracyResult" style="font-size: 1.5rem; color: var(--primary-color); font-weight: 600;">Draw a shape</div>
        </aside>
    </main>
    <script>
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            let size = Math.random() * 4 + 2;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (Math.random() * 15 + 10) + 's';
            p.style.animationDelay = (Math.random() * 10) + 's';
            particlesContainer.appendChild(p);
        }
    </script>
    <script>
const canvas = document.getElementById('drawCanvas');

const loading = document.getElementById('loading');

const accuracyResult = document.getElementById('accuracyResult');

    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
