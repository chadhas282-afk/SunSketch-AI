<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUNSketch AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #120a00;
            --panel-bg: rgba(30, 20, 10, 0.6);
            --border-color: rgba(255, 170, 0, 0.15);
            --primary-color: #ffaa00;
            --primary-glow: rgba(255, 170, 0, 0.4);
            --text-main: #fffcf8;
            --text-muted: #e5ccb3;
        }
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, var(--bg-color) 0%, #2a1600 100%);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }
        .ambient-light {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--primary-glow) 0%, rgba(0,0,0,0) 70%);
            filter: blur(80px);
            z-index: -1;
             pointer-events: none;
        }
        header {
            padding: 2rem;
            text-align: center;
        }
        header h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #fff, #ffcc55);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p {
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-weight: 300;
        }
        main {
            display: flex;
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem 2rem 2rem;
            flex-grow: 1;
            align-items: flex-start;
            width: 100%;
            box-sizing: border-box;
        }
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 170, 0, 0.15);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 170, 0, 0.05), transparent);
            transform: skewX(-20deg);
            animation: shimmer 8s infinite;
        }
        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 200%; }
        }
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            background: rgba(255, 200, 50, 0.15);
            border-radius: 50%;
            animation: float linear infinite;
        }
        @keyframes float {
            0% { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
            10% { opacity: 0.6; scale: 1; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100px) translateX(100px) scale(0); opacity: 0; }
        }
        .workspace {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }
        .canvas-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            overflow: hidden;
            border: 2px dashed rgba(255, 170, 0, 0.2);
            transition: border-color 0.3s;
        }
        .canvas-container:hover {
            border-color: rgba(255, 170, 0, 0.5);
            }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            z-index: 10;
        }
        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            }
        svg.visible {
            opacity: 1;
        }
        .controls {
            display: flex;
            gap: 1rem;
            width: 100%;
            justify-content: center;
        }
        button {
            background: rgba(255, 170, 0, 0.05);
            color: white;
            border: 1px solid var(--border-color);
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-family: inherit;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
